# Common API Key header parameter
api_key_header:
  in: header
  name: X-Api-Key
  description: Use the X-Api-Key header to provide your workspace API key. Refer to [Authentication](/getting-started/authentication) for more information.
  required: true
  schema:
    type: string

# Common Accept header parameter
accept_header:
  in: header
  name: Accept
  description: Specifies the expected response format. Must be set to `application/json` for proper API communication.
  required: true
  schema:
    type: string
    enum: ["application/json"]
    default: "application/json"

# Common pagination parameters
page_number_param:
  in: query
  name: page_number
  description: Page of results to retrieve, starting from 1. Defaults to 1 when omitted.
  required: false
  schema:
    type: integer
    default: 1
    example: 1

page_size_param:
  in: query
  name: page_size
  description: Number of records returned per page. Each endpoint applies its own default and maximum value.
  required: false
  schema:
    type: integer
    example: 15

# Common path parameters
project_id_param:
  in: path
  name: project_id
  description: Id of the project. You can get `project_id` by listing your projects using the [List projects](/api-reference/projects/list) API.
  required: true
  schema:
    type: string
    example: "pdqmxlz"

run_id_param:
  in: path
  name: run_id
  description: Id of the run. You can get `run_id` by listing runs using the [List runs](/api-reference/runs/list) API.
  required: true
  schema:
    type: string
    example: "kftwnab"

test_entity_id_param:
  in: path
  name: test_entity_id
  description: Id of the test entity (a spec or a test). You can get `test_entity_id` by listing test entities using the [List test entities](/api-reference/test-entities/list) API.
  required: true
  schema:
    type: string
    example: "vhrscje"

components:
  schemas:
    # Pagination object structure
    pagination:
      type: object
      properties:
        total_records:
          type: integer
          description: Total number of records across all pages.
          example: 42
        total_pages:
          type: integer
          description: Total number of pages available.
          example: 3
        current_page_number:
          type: integer
          description: Current page number.
          example: 1
        page_size:
          type: integer
          description: Number of records per page.
          example: 15
